<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ginja-brain</title>
<style>
  :root {
    --bg: #020b12; --primary: #00e5ff; --secondary: #4dd0e1;
    --accent: #b2ebf2; --text: #d9f6fb;
    --panel: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.09);
    --muted: rgba(255,255,255,0.45); --grid: rgba(255,255,255,0.07);
    /* fixed categorical palette (validated, dark surface) — identity, never re-sorted */
    --cat-tool: #3987e5; --cat-concept: #199e70; --cat-system: #c98500;
    --cat-goal: #9085e9; --cat-technique: #e66767;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    min-height: 100vh;
  }
  #topbar {
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
  }
  #banner { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: 0.5px; }
  #live-status { margin-left: auto; color: var(--muted); }
  #live-status.thinking { color: var(--accent); }
  #live-status.thinking::before { content: "▶ "; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: 0.25; } }

  main {
    display: grid; gap: 14px; padding: 14px 20px 28px;
    grid-template-columns: repeat(12, 1fr);
  }
  section {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; min-width: 0;
  }
  h2 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px;
  }
  #now-panel { grid-column: span 8; }
  #health-panel { grid-column: span 4; }
  #growth-panel { grid-column: span 6; }
  #eval-panel { grid-column: span 6; }
  #vitals-panel { grid-column: span 6; }
  #output-panel { grid-column: span 6; }
  #graph-panel { grid-column: span 9; position: relative; }
  #live-panel { grid-column: span 3; }
  @media (max-width: 1100px) {
    main > section { grid-column: span 12; }
  }

  canvas { display: block; width: 100%; border-radius: 4px; }

  /* status colors: reserved for state, never series identity */
  #alarm-badge {
    display: none; background: rgba(230,103,103,0.15); color: #e66767;
    border: 1px solid #e66767; border-radius: 999px; font-size: 11px; padding: 1px 10px;
  }
  #feed { max-height: 430px; overflow-y: auto; }
  .feed-row { display: grid; grid-template-columns: 42px 10px 86px 1fr; gap: 8px;
              align-items: baseline; padding: 3px 0; font-size: 12px; }
  .feed-time { color: var(--muted); font-size: 11px; }
  .feed-dot { width: 7px; height: 7px; border-radius: 50%; align-self: center; }
  .feed-dot.info { background: var(--muted); }
  .feed-dot.ok { background: #199e70; }
  .feed-dot.warn { background: #c98500; }
  .feed-dot.alert { background: #e66767; }
  .feed-src { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .feed-text { color: var(--text); overflow-wrap: anywhere; }
  .feed-day { color: var(--accent); font-size: 10px; text-transform: uppercase;
              letter-spacing: 1.5px; padding: 8px 0 2px; border-bottom: 1px solid var(--border); }

  .stale-row { display: flex; justify-content: space-between; gap: 8px;
               font-size: 11px; padding: 2px 0; color: var(--muted); }
  .stale-row .overdue { color: #e66767; }
  .stale-row .okage { color: var(--muted); }
  #staleness { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 8px; }

  .stat-row { display: flex; gap: 18px; margin: 10px 0; }
  .stat { text-align: left; }
  .stat b { font-size: 20px; color: var(--text); display: block; }
  .stat span { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  #brief { white-space: pre-wrap; color: var(--muted); font-size: 11.5px;
           max-height: 190px; overflow-y: auto; margin-top: 8px;
           border-top: 1px solid var(--border); padding-top: 8px; }

  .live-row { margin: 8px 0 14px; }
  .live-head { display: flex; align-items: baseline; gap: 7px; }
  .live-head i { width: 9px; height: 9px; border-radius: 2px; align-self: center; }
  .live-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .live-val { margin-left: auto; font-size: 16px; color: var(--text); }
  .fact-row { display: flex; justify-content: space-between; gap: 8px;
              font-size: 11px; color: var(--muted); padding: 2px 0; }
  .fact-row span:last-child { color: var(--text); }
  #live-facts { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 8px; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .chip {
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    font: inherit; font-size: 12px; padding: 2px 10px; border-radius: 999px; cursor: pointer;
  }
  .chip.on { color: var(--text); border-color: var(--primary); }
  #node-detail {
    position: absolute; right: 14px; top: 46px; width: 240px; display: none;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 12px; z-index: 5;
  }
  #node-detail b { color: var(--accent); }
  #node-detail .dim { color: var(--muted); }
  #graph-meta { color: var(--muted); font-size: 11px; margin-top: 6px; }

  .engine-row { display: grid; grid-template-columns: 98px 1fr 38px; gap: 8px; align-items: center; margin: 7px 0; }
  .engine-name { color: var(--text); font-size: 12px; }
  .engine-track { background: var(--grid); border-radius: 4px; height: 10px; overflow: hidden; }
  .engine-fill { height: 100%; border-radius: 0 4px 4px 0; background: var(--primary); transition: width 0.8s ease; }
  .engine-val { color: var(--muted); font-size: 11px; text-align: right; }

  svg text { font: 10px/1 "SF Mono", Menlo, monospace; fill: var(--muted); }
  .legend { display: flex; gap: 14px; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; vertical-align: -1px; }
  #tooltip {
    position: fixed; display: none; pointer-events: none; z-index: 10;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 9px; font-size: 11px; white-space: pre; color: var(--text);
  }

  .goal { margin: 8px 0; font-size: 13px; }
  .goal .tag { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
</style>

<div id="topbar">
  <span id="banner">ginja-brain</span>
  <span id="evo-phase" style="color:var(--muted)"></span>
  <span id="alarm-badge"></span>
  <span id="live-status">connecting…</span>
</div>

<main>
  <section id="now-panel">
    <h2>activity — what it is doing</h2>
    <div id="feed"><span style="color:var(--muted)">loading…</span></div>
  </section>

  <section id="health-panel">
    <h2>engine health</h2>
    <div id="engines"></div>
    <div id="staleness"></div>
  </section>

  <section id="growth-panel">
    <h2>growth — is it getting bigger</h2>
    <div class="chips" id="growth-chips"></div>
    <div class="legend">
      <span><i style="background:var(--cat-tool)"></i>memories</span>
      <span><i style="background:var(--cat-concept)"></i>kg nodes</span>
      <span><i style="background:var(--cat-system)"></i>kg edges</span>
      <span><i style="background:var(--cat-goal)"></i>evolution #</span>
    </div>
    <div id="growth-chart"></div>
  </section>

  <section id="eval-panel">
    <h2>self-eval trend (weighted score)</h2>
    <div id="eval-chart"></div>
  </section>

  <section id="vitals-panel">
    <h2>world perception — 24h</h2>
    <div class="legend">
      <span><i style="background:var(--cat-tool)"></i>GPU %</span>
      <span><i style="background:var(--cat-concept)"></i>RAM GB</span>
      <span><i style="background:var(--cat-system)"></i>load</span>
    </div>
    <div id="vitals-chart"></div>
  </section>

  <section id="output-panel">
    <h2>drive &amp; output</h2>
    <div id="goals"></div>
    <div class="stat-row" id="sugg-stats"></div>
    <div id="brief"></div>
  </section>

  <section id="graph-panel">
    <h2>knowledge graph — what it knows</h2>
    <div class="chips" id="graph-chips"></div>
    <canvas id="kg" height="430"></canvas>
    <div id="graph-meta"></div>
    <div id="node-detail"></div>
  </section>

  <section id="live-panel">
    <h2>host — live</h2>
    <div id="live-rows"><span style="color:var(--muted)">sampling…</span></div>
    <div id="live-facts"></div>
  </section>
</main>
<div id="tooltip"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
window.onerror = (msg, src, line) => {
  const el = document.getElementById("live-status");
  if (el) { el.textContent = `js error: ${msg} @${line}`; el.style.color = "#e66767"; }
};
const TAU = Math.PI * 2;
const hash = i => (Math.sin(i * 12.9898 + 78.233) * 43758.5453) % 1 * 0.5 + 0.5;
const CAT = { tool: "#3987e5", concept: "#199e70", system: "#c98500",
              goal: "#9085e9", technique: "#e66767" };
const ENGINE_GLYPHS = { Memory:"M", Cognition:"C", Perception:"P", Effector:"E",
                        Drive:"D", Safety:"S", Spine:"◆" };
// fixed engine list (mirrors telemetry.py) — names come from measurement, not the spec
const ENGINES = ["Memory", "Cognition", "Perception", "Effector", "Drive", "Safety", "Spine"];

let vitals = { gpu_pct: 0, lock: null }, selfModel = {}, engines = null;
let staleness = null;

function sizeCanvas(c) {
  const dpr = window.devicePixelRatio || 1;
  c.dataset.h = c.dataset.h || c.getAttribute("height"); // pixel-buffer writes clobber the attr
  const w = c.clientWidth, h = parseInt(c.dataset.h);
  c.width = w * dpr; c.height = h * dpr; c.style.height = h + "px";
  c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
  return [w, h];
}

// ── Knowledge graph (canvas force sim) ────────────────────────────────────────
const kg = $("kg"), kctx = kg.getContext("2d");
let gW = 0, gH = 0, gNodes = [], gEdges = [], gAdj = {}, gAlpha = 0;
let view = { x: 0, y: 0, k: 1 }, hoverNode = null, selNode = null;
let filters = { domain: null, category: null };

async function loadGraph() {
  const q = new URLSearchParams({ limit: "600" });
  if (filters.domain) q.set("domain", filters.domain);
  if (filters.category) q.set("category", filters.category);
  const g = await (await fetch("/api/graph?" + q)).json();
  [gW, gH] = sizeCanvas(kg);
  const deg = {};
  g.edges.forEach(e => { deg[e.source] = (deg[e.source] || 0) + 1; deg[e.target] = (deg[e.target] || 0) + 1; });
  gNodes = g.nodes.map((n, i) => ({
    ...n, deg: deg[n.id] || 0,
    x: gW / 2 + (hash(i * 1.7) - 0.5) * gW * 0.9,
    y: gH / 2 + (hash(i * 3.3) - 0.5) * gH * 0.9,
    vx: 0, vy: 0,
  }));
  const byId = Object.fromEntries(gNodes.map(n => [n.id, n]));
  gEdges = g.edges.map(e => ({ ...e, s: byId[e.source], t: byId[e.target] })).filter(e => e.s && e.t);
  gAdj = {};
  gEdges.forEach(e => {
    (gAdj[e.source] = gAdj[e.source] || []).push(e.t);
    (gAdj[e.target] = gAdj[e.target] || []).push(e.s);
  });
  gAlpha = 1;
  $("graph-meta").textContent =
    `${g.nodes.length} nodes · ${g.edges.length} edges` +
    (g.truncated ? ` (top by connectivity of ${g.total_nodes})` : "");
}

function simTick() {
  if (gAlpha < 0.005) return;
  gAlpha *= 0.985;
  const cell = 60, grid = new Map();
  gNodes.forEach(n => {
    const k = ((n.x / cell) | 0) + "," + ((n.y / cell) | 0);
    (grid.get(k) || grid.set(k, []).get(k)).push(n);
  });
  // repulsion via neighboring buckets
  gNodes.forEach(n => {
    const gx = (n.x / cell) | 0, gy = (n.y / cell) | 0;
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      const bucket = grid.get((gx + dx) + "," + (gy + dy));
      if (!bucket) continue;
      for (const m of bucket) {
        if (m === n) continue;
        let ddx = n.x - m.x, ddy = n.y - m.y;
        let d2 = ddx * ddx + ddy * ddy;
        if (d2 < 1) { ddx = hash(n.deg) - 0.5; ddy = 0.5 - hash(m.deg); d2 = 1; }
        if (d2 > cell * cell * 2) continue;
        const f = Math.min(320 / d2, 10) * gAlpha;
        n.vx += ddx * f; n.vy += ddy * f;
      }
    }
  });
  // springs
  gEdges.forEach(e => {
    const dx = e.t.x - e.s.x, dy = e.t.y - e.s.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1, want = 46;
    const f = (d - want) / d * 0.02 * gAlpha * (e.weight || 1);
    e.s.vx += dx * f; e.s.vy += dy * f;
    e.t.vx -= dx * f; e.t.vy -= dy * f;
  });
  // centering + integrate
  gNodes.forEach(n => {
    n.vx += (gW / 2 - n.x) * 0.004 * gAlpha;
    n.vy += (gH / 2 - n.y) * 0.004 * gAlpha;
    n.vx = Math.max(-30, Math.min(30, n.vx * 0.85));
    n.vy = Math.max(-30, Math.min(30, n.vy * 0.85));
    n.x += n.vx; n.y += n.vy;
  });
}

function drawGraph() {
  requestAnimationFrame(drawGraph);
  if (!gW) return;
  simTick();
  const ctx = kctx;
  ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
  ctx.clearRect(0, 0, gW, gH);
  ctx.translate(view.x, view.y); ctx.scale(view.k, view.k);
  const focus = selNode || hoverNode;
  const nbrs = focus ? new Set([focus, ...(gAdj[focus.id] || [])]) : null;
  ctx.lineWidth = 0.6 / view.k;
  gEdges.forEach(e => {
    const lit = focus && (e.s === focus || e.t === focus);
    ctx.strokeStyle = lit ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.10)";
    ctx.beginPath(); ctx.moveTo(e.s.x, e.s.y); ctx.lineTo(e.t.x, e.t.y); ctx.stroke();
  });
  gNodes.forEach(n => {
    const r = (2.4 + Math.min(6, n.deg * 0.7)) / Math.sqrt(view.k);
    const faded = nbrs && !nbrs.has(n);
    ctx.globalAlpha = faded ? 0.18 : 1;
    ctx.fillStyle = CAT[n.category] || "#888";
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, TAU); ctx.fill();
    if (!faded && (n === focus || (view.k > 1.6 && n.deg > 2))) {
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.font = `${11 / view.k}px Menlo, monospace`;
      ctx.fillText(n.label, n.x + r + 3 / view.k, n.y + 3 / view.k);
    }
  });
  ctx.globalAlpha = 1;
}

function graphPointer(ev) {
  const rect = kg.getBoundingClientRect();
  const x = (ev.clientX - rect.left - view.x) / view.k;
  const y = (ev.clientY - rect.top - view.y) / view.k;
  let best = null, bd = 14 / view.k;
  gNodes.forEach(n => {
    const d = Math.hypot(n.x - x, n.y - y);
    if (d < bd) { bd = d; best = n; }
  });
  return best;
}
let dragging = false, dragMoved = false, last = null;
kg.addEventListener("pointerdown", ev => { dragging = true; dragMoved = false; last = [ev.clientX, ev.clientY]; });
window.addEventListener("pointerup", () => { dragging = false; });
kg.addEventListener("pointermove", ev => {
  if (dragging) {
    view.x += ev.clientX - last[0]; view.y += ev.clientY - last[1];
    last = [ev.clientX, ev.clientY]; dragMoved = true;
    return;
  }
  hoverNode = graphPointer(ev);
  kg.style.cursor = hoverNode ? "pointer" : "grab";
});
kg.addEventListener("click", ev => {
  if (dragMoved) return;
  selNode = graphPointer(ev);
  const d = $("node-detail");
  if (!selNode) { d.style.display = "none"; return; }
  const n = selNode;
  d.innerHTML = `<b>${n.label}</b><br>
    <span class="dim">${n.category} · ${n.domain} · cycle ${n.cycle}</span><br>
    <span class="dim">links: ${n.deg} · confidence ${(+n.confidence).toFixed(2)}</span>
    ${n.description ? "<br><br>" + n.description : ""}`;
  d.style.display = "block";
});
kg.addEventListener("wheel", ev => {
  ev.preventDefault();
  const rect = kg.getBoundingClientRect();
  const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
  const k2 = Math.max(0.3, Math.min(6, view.k * (ev.deltaY < 0 ? 1.15 : 0.87)));
  view.x = mx - (mx - view.x) * k2 / view.k;
  view.y = my - (my - view.y) * k2 / view.k;
  view.k = k2;
}, { passive: false });

function buildChips() {
  const box = $("graph-chips");
  const mk = (label, group, val) => {
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = label;
    b.onclick = () => {
      filters[group] = filters[group] === val ? null : val;
      [...box.children].forEach(c => {
        if (c.dataset.group === group) c.classList.toggle("on", c.dataset.val === (filters[group] || ""));
      });
      selNode = null; $("node-detail").style.display = "none";
      loadGraph();
    };
    b.dataset.group = group; b.dataset.val = val || "";
    box.appendChild(b);
    return b;
  };
  ["homelab", "ai", "networking", "storage", "general"].forEach(d => mk(d, "domain", d));
  const sep = document.createElement("span"); sep.style.width = "10px"; box.appendChild(sep);
  Object.keys(CAT).forEach(c => {
    const b = mk(c, "category", c);
    b.style.borderColor = CAT[c] + "88";
  });
}

// ── SVG line charts (crosshair tooltip, recessive grid) ───────────────────────
const tooltip = $("tooltip");
function lineChart(el, seriesList, opts) {
  const W = el.clientWidth || 320, H = opts.height || 150;
  const spark = !!opts.spark;  // sparkline: no grid/axis chrome, tooltip stays
  const padL = spark ? 2 : 34, padR = spark ? 2 : 8, padT = spark ? 2 : 8,
        padB = spark ? 2 : 18;
  const pts = seriesList.flatMap(s => s.data);
  if (!pts.length) { el.innerHTML = "<span style='color:var(--muted)'>no data yet</span>"; return; }
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  let y0 = opts.y0 !== undefined ? opts.y0 : Math.min(...ys), y1 = Math.max(...ys);
  if (y1 === y0) y1 = y0 + 1;
  y1 += (y1 - y0) * 0.08;
  const X = x => padL + (x - x0) / (x1 - x0 || 1) * (W - padL - padR);
  const Y = y => padT + (1 - (y - y0) / (y1 - y0)) * (H - padT - padB);
  let svg = `<svg width="${W}" height="${H}" style="overflow:visible">`;
  if (!spark) {
    for (let i = 0; i <= 3; i++) {
      const yv = y0 + (y1 - y0) * i / 3, yy = Y(yv);
      svg += `<line x1="${padL}" x2="${W - padR}" y1="${yy}" y2="${yy}" stroke="var(--grid)"/>`;
      svg += `<text x="${padL - 5}" y="${yy + 3}" text-anchor="end">${(+yv.toFixed(yv < 10 ? 1 : 0))}</text>`;
    }
  }
  seriesList.forEach(s => {
    const d = s.data.map((p, i) => (i ? "L" : "M") + X(p.x).toFixed(1) + " " + Y(p.y).toFixed(1)).join("");
    svg += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>`;
  });
  const fmt = opts.fmtX || (x => new Date(x).toTimeString().slice(0, 5));
  if (!spark) {
    svg += `<text x="${padL}" y="${H - 4}">${fmt(x0)}</text>`;
    svg += `<text x="${W - padR}" y="${H - 4}" text-anchor="end">${fmt(x1)}</text>`;
  }
  svg += `<line id="xh" y1="${padT}" y2="${H - padB}" stroke="rgba(255,255,255,0.3)" style="display:none"/></svg>`;
  el.innerHTML = svg;
  const svgEl = el.firstChild, xh = svgEl.querySelector("#xh");
  svgEl.addEventListener("pointermove", ev => {
    const rect = svgEl.getBoundingClientRect();
    const px = ev.clientX - rect.left;
    const xv = x0 + (px - padL) / (W - padL - padR) * (x1 - x0);
    xh.setAttribute("x1", px); xh.setAttribute("x2", px); xh.style.display = "block";
    const lines = seriesList.map(s => {
      let bp = s.data[0];
      s.data.forEach(p => { if (Math.abs(p.x - xv) < Math.abs(bp.x - xv)) bp = p; });
      return `${s.name}: ${(+bp.y.toFixed(2))}`;
    });
    tooltip.textContent = fmt(xv) + "\n" + lines.join("\n");
    tooltip.style.display = "block";
    tooltip.style.left = (ev.clientX + 14) + "px";
    tooltip.style.top = (ev.clientY - 10) + "px";
  });
  svgEl.addEventListener("pointerleave", () => {
    xh.style.display = "none"; tooltip.style.display = "none";
  });
}

// ── Panels ────────────────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const fmtAge = s => s == null ? "?" : s < 5400 ? Math.round(s / 60) + "m"
  : s < 172800 ? (s / 3600).toFixed(1) + "h" : (s / 86400).toFixed(1) + "d";

function renderEngines() {
  const act = (engines && engines.activity) || {};
  const detail = (engines && engines.detail) || {};
  $("engines").innerHTML = ENGINES.map(e => {
    const a = act[e] != null ? act[e] : 0;
    return `
    <div class="engine-row" title="${esc(detail[e] || "")}">
      <span class="engine-name">${ENGINE_GLYPHS[e]} ${e}</span>
      <div class="engine-track"><div class="engine-fill" style="width:${a * 100}%"></div></div>
      <span class="engine-val">${Math.round(a * 100)}%</span>
    </div>
    <div style="color:var(--muted);font-size:10px;margin:-4px 0 6px 106px">${esc(detail[e] || "")}</div>`;
  }).join("");
}

function renderHealth() {
  if (!staleness) return;
  const rows = staleness.sources || [];
  const bad = rows.filter(r => !r.ok).length + (staleness.qdrant_up ? 0 : 1);
  const badge = $("alarm-badge");
  badge.style.display = bad ? "inline-block" : "none";
  badge.textContent = bad ? `${bad} overdue` : "";
  $("staleness").innerHTML =
    `<div class="stale-row"><span>qdrant</span>` +
    (staleness.qdrant_up ? `<span class="okage">up</span>`
                         : `<span class="overdue">unreachable</span>`) + `</div>` +
    rows.map(r => `<div class="stale-row"><span>${esc(r.name)}</span>` +
      (r.ok ? `<span class="okage">${fmtAge(r.age_s)} ago · ok</span>`
            : r.age_s == null
              ? `<span class="overdue">missing</span>`
              : `<span class="overdue">overdue by ${fmtAge(r.overdue_s)}</span>`) +
      `</div>`).join("");
}

// ── Live host panel (fed by SSE ~2s samples; rolling in-page window) ──────────
const liveBuf = [];
let liveHover = false;
function pushSample(v) {
  liveBuf.push({ t: Date.now(), gpu: v.gpu_pct || 0,
                 ram: (v.ram_used_mb || 0) / 1024, load: +v.load || 0 });
  if (liveBuf.length > 220) liveBuf.shift();
}
const LIVE_ROWS = [
  { key: "gpu",  label: "gpu util",  unit: "%",  color: CAT.tool,    fmt: x => Math.round(x) },
  { key: "ram",  label: "ram used",  unit: "GB", color: CAT.concept, fmt: x => x.toFixed(1) },
  { key: "load", label: "load 1m",   unit: "",   color: CAT.system,  fmt: x => x.toFixed(2) },
];
function renderLive() {
  if (!liveBuf.length) return;
  const box = $("live-rows");
  const cur = liveBuf[liveBuf.length - 1];
  if (!box.dataset.built) {
    box.dataset.built = "1";
    box.innerHTML = LIVE_ROWS.map(r => `
      <div class="live-row">
        <div class="live-head"><i style="background:${r.color}"></i>
          <span class="live-label">${r.label}</span>
          <b class="live-val" id="lv-${r.key}"></b></div>
        <div class="live-chart" id="lc-${r.key}"></div>
      </div>`).join("");
    // freeze redraws while inspecting, so the crosshair tooltip survives ticks
    box.addEventListener("pointerenter", () => { liveHover = true; });
    box.addEventListener("pointerleave", () => { liveHover = false; });
  }
  LIVE_ROWS.forEach(r => {
    $("lv-" + r.key).textContent = r.fmt(cur[r.key]) + (r.unit ? " " + r.unit : "");
    if (!liveHover)
      lineChart($("lc-" + r.key), [{ name: r.label, color: r.color,
        data: liveBuf.map(p => ({ x: p.t, y: p[r.key] })) }],
        { height: 44, y0: 0, spark: true,
          fmtX: x => new Date(x).toTimeString().slice(0, 8) });
  });
  const v = vitals, gb = mb => (mb / 1024).toFixed(1);
  $("live-facts").innerHTML =
    `<div class="fact-row"><span>vram</span><span>${gb(v.vram_used || 0)} / ${gb(v.vram_total || 0)} GB</span></div>` +
    `<div class="fact-row"><span>ram</span><span>${gb(v.ram_used_mb || 0)} / ${gb(v.ram_total_mb || 0)} GB</span></div>` +
    (v.disk_total_gb ? `<div class="fact-row"><span>disk (${esc(String(v.disk_used_gb && v.disk_total_gb ? Math.round(v.disk_used_gb / v.disk_total_gb * 100) : 0))}%)</span><span>${v.disk_used_gb} / ${v.disk_total_gb} GB</span></div>` : "") +
    (v.uptime_s ? `<div class="fact-row"><span>host uptime</span><span>${fmtAge(v.uptime_s)}</span></div>` : "") +
    `<div class="fact-row"><span>window</span><span>last ${fmtAge((cur.t - liveBuf[0].t) / 1000)}</span></div>`;
}

async function renderFeed() {
  const events = await (await fetch("/api/activity?limit=60")).json();
  const today = new Date().toDateString();
  let lastDay = null, html = "";
  events.forEach(e => {
    const d = new Date(e.epoch * 1000);
    const day = d.toDateString();
    if (day !== lastDay) {
      lastDay = day;
      html += `<div class="feed-day">${day === today ? "today" : day.slice(0, 10)}</div>`;
    }
    html += `
    <div class="feed-row" title="${esc(e.ts)} · ${esc(e.kind)}">
      <span class="feed-time">${d.toTimeString().slice(0, 5)}</span>
      <span class="feed-dot ${e.severity}"></span>
      <span class="feed-src">${esc(e.source)}</span>
      <span class="feed-text">${esc(e.text)}</span>
    </div>`;
  });
  $("feed").innerHTML = html || "<span style='color:var(--muted)'>no events yet</span>";
}

let growthHours = 168;
async function renderGrowth() {
  const ts = await (await fetch("/api/timeseries?hours=" + growthHours)).json();
  const t = p => new Date(p.ts).getTime();
  const qd = k => ts.filter(p => p.qdrant && p.qdrant[k] != null).map(p => ({ x: t(p), y: p.qdrant[k] }));
  const fmtX = growthHours > 48
    ? x => new Date(x).toISOString().slice(5, 10)
    : x => new Date(x).toTimeString().slice(0, 5);
  lineChart($("growth-chart"), [
    { name: "memories", color: CAT.tool, data: qd("memories") },
    { name: "kg nodes", color: CAT.concept, data: qd("kg_nodes") },
    { name: "kg edges", color: CAT.system, data: qd("kg_edges") },
    { name: "evolution #", color: CAT.goal, data: ts.filter(p => p.evolution != null).map(p => ({ x: t(p), y: p.evolution })) },
  ], { height: 160, y0: 0, fmtX });
}
function buildGrowthChips() {
  const box = $("growth-chips");
  [["24h", 24], ["7d", 168], ["14d", 336]].forEach(([label, hours]) => {
    const b = document.createElement("button");
    b.className = "chip" + (hours === growthHours ? " on" : "");
    b.textContent = label;
    b.onclick = () => {
      growthHours = hours;
      [...box.children].forEach(c => c.classList.toggle("on", c === b));
      renderGrowth();
    };
    box.appendChild(b);
  });
}

async function renderEvals() {
  const ev = await (await fetch("/api/evals")).json();
  const data = ev.filter(e => e.weighted_score != null)
    .map(e => ({ x: e.evolution_count, y: e.weighted_score, raw: e }));
  lineChart($("eval-chart"), [{ name: "score", color: "var(--primary)", data }],
    { height: 150, y0: 0, fmtX: x => "evo #" + Math.round(x) });
}

async function renderVitals() {
  const ts = await (await fetch("/api/timeseries?hours=24")).json();
  const t = p => new Date(p.ts).getTime();
  lineChart($("vitals-chart"), [
    { name: "GPU %", color: CAT.tool, data: ts.filter(p => p.gpu_pct != null).map(p => ({ x: t(p), y: p.gpu_pct })) },
    { name: "RAM GB", color: CAT.concept, data: ts.filter(p => p.ram_used != null).map(p => ({ x: t(p), y: p.ram_used })) },
    { name: "load", color: CAT.system, data: ts.filter(p => p.load != null).map(p => ({ x: t(p), y: p.load })) },
  ], { height: 150, y0: 0 });
}

async function renderOutput() {
  const [g, o] = await Promise.all([
    (await fetch("/api/goals")).json(),
    (await fetch("/api/output")).json(),
  ]);
  const ns = g.goals.north_star || {};
  const medium = g.goals.medium || [];
  const queue = g.goals.queue || [];
  let html = `<div class="goal"><span class="tag">★ north star</span><br>${esc(ns.goal || "—")}</div>`;
  if (medium.length || queue.length) {
    medium.slice(0, 3).forEach(m =>
      html += `<div class="goal"><span class="tag">◎ medium</span><br>${esc(m.goal || m)}</div>`);
    queue.slice(0, 3).forEach(q =>
      html += `<div class="goal"><span class="tag">· queued</span><br>${esc(q.goal || q)}</div>`);
  } else {
    html += `<div class="goal"><span class="tag">no medium or queued goals</span></div>`;
  }
  (o.pending || []).slice(0, 2).forEach(p =>
    html += `<div class="goal"><span class="tag">✦ pending suggestion</span><br>${esc(p.text || p)}</div>`);
  $("goals").innerHTML = html;

  const st = o.suggestion_stats || {}, wk = o.last7d || {};
  $("sugg-stats").innerHTML = ["implemented", "rejected", "deferred"].map(k =>
    `<div class="stat"><b>${st[k] || 0}</b><span>${k}<br>${wk[k] || 0} in 7d</span></div>`
  ).join("") +
    `<div class="stat"><b>${o.total_suggestions || 0}</b><span>suggestions<br>all time</span></div>`;

  $("brief").textContent = o.brief
    ? `morning brief · ${fmtAge(o.brief_age_s)} ago\n\n${o.brief}` : "no morning brief yet";
}

// ── Live state (SSE with polling fallback) ────────────────────────────────────
let lastLockModel = null;
function applyState(s) {
  vitals = s.vitals; selfModel = s.self_model; engines = s.engines;
  staleness = s.staleness;
  pushSample(vitals);
  renderEngines();
  renderHealth();
  renderLive();
  $("evo-phase").textContent =
    `evo #${selfModel.evolution_count || 0} · ${selfModel.phase || "?"}`;
  const st = $("live-status");
  if (vitals.lock) {
    st.className = "thinking";
    st.textContent = `thinking with ${vitals.lock.model || "?"}`;
  } else {
    st.className = "";
    st.textContent = `idle · gpu ${vitals.gpu_pct}% · load ${(+vitals.load).toFixed(2)}`;
  }
  const lockModel = vitals.lock ? (vitals.lock.model || "?") : null;
  if (lockModel !== lastLockModel) renderFeed();  // thinking started/stopped
  lastLockModel = lockModel;
}

function connect() {
  try {
    const es = new EventSource("/api/events");
    es.onmessage = ev => applyState(JSON.parse(ev.data));
    es.onerror = () => { es.close(); setTimeout(pollLoop, 1000); };
  } catch (e) { pollLoop(); }
}
async function pollLoop() {
  try { applyState(await (await fetch("/api/state")).json()); }
  catch (e) { /* server briefly away */ }
  setTimeout(pollLoop, 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener("resize", () => { [gW, gH] = sizeCanvas(kg); gAlpha = Math.max(gAlpha, 0.1); });
buildChips();
buildGrowthChips();
connect();
loadGraph();
renderFeed(); renderGrowth(); renderEvals(); renderVitals(); renderOutput();
setInterval(renderFeed, 30000);
setInterval(() => { renderGrowth(); renderEvals(); renderVitals(); renderOutput(); }, 120000);
requestAnimationFrame(drawGraph);
</script>
